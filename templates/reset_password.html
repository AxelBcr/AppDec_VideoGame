{% extends "base.html" %}
{% block title %}Réinitialiser mon mot de passe – GameStore{% endblock %}

{% block content %}
<section class="form-container">
    <h2>🔐 Réinitialiser le mot de passe</h2>
    <form method="post" class="entity-form">
        <label for="password">Nouveau mot de passe</label>
        <input type="password" name="password" id="password" required minlength="4" autocomplete="new-password">

        <label for="password_confirm">Confirmer le mot de passe</label>
        <input type="password" name="password_confirm" id="password_confirm" required minlength="4" autocomplete="new-password">

        <button type="submit">Mettre à jour le mot de passe</button>
    </form>
</section>
{% endblock %}
