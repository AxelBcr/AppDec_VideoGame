{% extends "base.html" %}
{% block title %}Modifier – {{ product.product_name }}{% endblock %}

{% block content %}
<section>
    <h2>Modifier le produit {{ product.product_id }}</h2>

    <form method="post" class="entity-form">
        <label>Nom
            <input type="text" name="name" value="{{ product.product_name }}" required>
        </label>
        <label>Catégorie
            <input type="text" name="category" value="{{ product.product_category }}"
                   required list="categories-list">
        </label>
        <label>Plateforme
            <input type="text" name="platform" value="{{ product.product_platform }}"
                   required list="platforms-list">
        </label>
        <label>ESRB / PEGI
            <input type="text" name="esrb" value="{{ product.product_esrb_rating }}"
                   required list="esrb-list">
        </label>
        <label>Année de sortie
            <input type="number" name="year" value="{{ product.product_release_year }}" min="1970" required>
        </label>
        <label>Prix (€)
            <input type="number" name="price" value="{{ product.product_price }}" step="0.01" min="0.01" required>
        </label>
        <label>Poids (g)
            <input type="number" name="weight" value="{{ product.product_weight_g }}" min="1" required>
        </label>
        <label>Description
            <input type="text" name="description" value="{{ product.product_description or '' }}">
        </label>

        <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
            <button type="submit">Enregistrer</button>
            <a href="{{ url_for('products_list') }}" class="btn-back">Annuler</a>
        </div>
    </form>

    <!-- Datalists pour autocomplétion -->
    <datalist id="categories-list"></datalist>
    <datalist id="platforms-list"></datalist>
    <datalist id="esrb-list">
        <option value="3+">
        <option value="7+">
        <option value="12+">
        <option value="16+">
        <option value="18+">
        <option value="Everyone">
        <option value="Everyone 10+">
        <option value="Teen">
        <option value="Mature">
    </datalist>
</section>
{% endblock %}
