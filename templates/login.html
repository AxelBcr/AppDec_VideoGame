{% extends "base.html" %}
{% block title %}Connexion – GameStore{% endblock %}

{% block content %}
<section class="form-container">
    <h2>🎮 Connexion</h2>
    <form method="post" class="entity-form">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" required autocomplete="email">

        <label for="password">Mot de passe</label>
        <input type="password" name="password" id="password" required autocomplete="current-password">

        <button type="submit">Se connecter</button>
    </form>

    <p style="text-align:center; margin-top:1rem; font-size:0.9rem;">
        <a href="{{ url_for('forgot_password') }}">Mot de passe oublié ?</a>
        <br>
        Pas encore de compte ?
        <a href="{{ url_for('register') }}">Créer un compte</a>
        <br>
        <a href="{{ url_for('contact') }}">Nous contacter</a>
    </p>
</section>
{% endblock %}
