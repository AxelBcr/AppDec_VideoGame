{% extends "base.html" %}
{% block title %}Modifier – {{ customer.first_name }} {{ customer.last_name }}{% endblock %}

{% block content %}
<section>
    <h2>Modifier le client {{ customer.customer_id }}</h2>

    <form method="post" class="entity-form">
        <label>Prénom
            <input type="text" name="first_name" value="{{ customer.first_name }}" required>
        </label>
        <label>Nom
            <input type="text" name="last_name" value="{{ customer.last_name }}" required>
        </label>
        <label>E-mail
            <input type="email" name="email" value="{{ customer.email }}" required>
        </label>
        <label>Nouveau mot de passe (laisser vide pour ne pas changer)
            <input type="password" name="password" autocomplete="new-password" minlength="4">
        </label>
        <label>Téléphone
            <input type="tel" name="phone" value="{{ customer.phone or '' }}"
                   pattern="0[1-9]\d{8}" maxlength="10"
                   placeholder="0612345678" title="10 chiffres commençant par 0">
        </label>
        <label>Code postal
            <input type="text" name="zip_code_prefix" value="{{ customer.zip_code_prefix }}"
                   pattern="\d{5}" maxlength="5"
                   placeholder="75001" title="5 chiffres (format français)">
        </label>
        <label>Ville
            <input type="text" name="city" value="{{ customer.city }}"
                   list="cities-list" autocomplete="address-level2">
        </label>
        <label>Région / État
            <input type="text" name="state" value="{{ customer.state }}"
                   list="states-list" autocomplete="address-level1">
        </label>
        <label>Adresse ligne 1
            <input type="text" name="address_line1" value="{{ customer.address_line1 or '' }}">
        </label>
        <label>Adresse ligne 2
            <input type="text" name="address_line2" value="{{ customer.address_line2 or '' }}">
        </label>
        <label>Rôle administrateur
            <select name="is_admin">
                <option value="" selected>(inchangé)</option>
                <option value="0">Non</option>
                <option value="1">Oui</option>
            </select>
        </label>

        <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
            <button type="submit">Enregistrer</button>
            <a href="{{ url_for('customers_list') }}" class="btn-back">Annuler</a>
        </div>
    </form>

    <!-- Datalists pour autocomplétion -->
    <datalist id="cities-list"></datalist>
    <datalist id="states-list"></datalist>
</section>
{% endblock %}
